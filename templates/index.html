<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://raw.githubusercontent.com/Toperlock/sing-box-subscribe/main/public/favicon.ico" type="image/x-icon">
    <title>生成sing-box配置</title>
    <style>
        * { box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            position: relative;
            /* 页面背景图，用于模糊 */
            background: #f2f2f2 url('https://bing.img.run/1920x1080.php') center/cover no-repeat fixed; 
        }
        
        /* 模糊背景遮罩 - 确保覆盖全屏 */
        body::before {
            content: '';
            position: fixed; /* 关键：固定定位，覆盖整个视口 */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: inherit; /* 继承 body 的背景图 */
            filter: blur(25px); /* 降低模糊程度，原为 50px */
            z-index: 1;
        }
        
        .container {
            display: flex;
            gap: 20px;
            z-index: 2;
            background: rgba(255, 255, 255, 0.75);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            max-width: 90%;
            width: 800px;
        }
        .right-box, .config-content { flex: 1; width: 100%; }
        h1 { margin-top: 0; font-size: 1.5rem; color: #333; }
        textarea {
            width: 100%;
            height: 300px;
            font-family: monospace;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            resize: vertical;
        }
        select, input[type="submit"] {
            padding: 8px 14px;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        input[type="submit"]:hover { background-color: #45a049; }
        .form-inline { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        pre {
            background-color: rgba(0, 0, 0, 0.85);
            color: #00ff00;
            padding: 15px;
            border-radius: 6px;
            overflow: auto;
            height: 350px;
            font-family: monospace;
            white-space: pre-wrap;
            margin: 0;
        }
        .flashes { list-style: none; padding: 0; color: #ff3b30; z-index: 2; position: relative; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul class="flashes">
                {% for message in messages %} <li>{{ message }}</li> {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    <div class="container">
        <div class="right-box">
            <h1>sing-box 配置转换器</h1>
            <form id="temp-json-form" method="POST" action="/edit_temp_json">
                <textarea name="temp_json_data" placeholder="请输入 JSON 配置...">{{ temp_json_data | default('') }}</textarea>
                <input type="submit" value="保存配置">
            </form>
            
            <form method="POST" action="/generate_config" class="form-inline">
                <select name="template_index">
                    {% for option in template_options %}
                    <option value="{{ loop.index - 1 }}">{{ option }}</option>
                    {% endfor %}
                </select>
                <input type="submit" value="选择并生成">
            </form>
        </div>
        
        <div class="config-content">
            <pre id="config-text">生成的结果将显示在这里...</pre>
        </div>
    </div>

    <script>
        // 异步提交表单并局部刷新结果
        document.getElementById('temp-json-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            try {
                const response = await fetch(form.action, {
                    method: form.method,
                    body: new FormData(form),
                });
                if (response.ok) {
                    document.getElementById('config-text').textContent = await response.text();
                } else {
                    alert('保存失败，服务器响应错误。');
                }
            } catch (err) {
                console.error('请求失败:', err);
            }
        });
    </script>
</body>
</html>
